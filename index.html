<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Sofa E-Postcard</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; text-align: center; background: #fdfaf3; padding: 0; margin: 0; }
        .container { max-width: 500px; margin: 30px auto; padding: 20px; box-sizing: border-box; }
        canvas { display: none; }
        #displayImage { max-width: 100%; height: auto; border: 1px solid #e0dbce; border-radius: 8px; margin-top: 15px; display: block; margin-left: auto; margin-right: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .upload-wrapper { margin-top: 25px; position: relative; }
        .btn { display: inline-block; padding: 18px 30px; background: #c5a363; color: #fff; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: background 0.2s ease; margin: 10px 0; }
        .btn:hover { background: #ae8f55; }
        #downloadBtn { background: #3c3c3c; display: none; }
        input[type="file"] { display: none; }
        .instructions { font-size: 16px; color: #555; margin-top: 20px; display: none; line-height: 1.5; }
        .instructions strong { color: #c5a363; }
        h2 { font-weight: 300; font-size: 24px; margin-bottom: 5px; color: #3c3c3c; }
        p.subtitle { font-size: 14px; color: #888; margin-top: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Make It Yours!</h2>
    <p class="subtitle">Upload your photo to embed yourself into the 'Blue Sofa' postcard.</p>

    <!-- Hidden Template Area -->
    <img id="hiddenTemplate" src="Blue%20Sofa_Template.png" style="display:none;" alt="" onerror="console.error('Template image failed to load. Check the filename and capitalization!');" />

    <div class="upload-wrapper">
        <label for="imageLoader" class="btn">📸 Upload Your Photo</label>
        <input type="file" id="imageLoader" accept="image/*"/>
    </div>
    
    <canvas id="postcardCanvas"></canvas>

    <img id="displayImage" src="Blue%20Sofa_Template.png" alt="Postcard Template" />

    <a id="downloadBtn" class="btn">💾 Download Postcard</a>

    <div class="instructions" id="saveInstructions">
        <p><strong>✨ Postcard Created!</strong></p>
        <p>You are now embedded into the 'Blue Sofa'!</p>
        <p>Click the button above or long-press the image to save it.</p>
    </div>
</div>

<script>
    // 1. Setup Canvas
    const CANVAS_WIDTH = 686;
    const CANVAS_HEIGHT = 1188;
    const canvas = document.getElementById('postcardCanvas');
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
    const ctx = canvas.getContext('2d');

    const imageLoader = document.getElementById('imageLoader');
    const displayImage = document.getElementById('displayImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const saveInstructions = document.getElementById('saveInstructions');
    const templateImg = document.getElementById('hiddenTemplate');

    imageLoader.addEventListener('change', handleImage, false);

    function handleImage(e) {
        const file = e.target.files[0];
        if (!file) return;

        const uploadLabel = document.querySelector('.upload-wrapper .btn');
        uploadLabel.innerText = "⏳ Processing...";

        const reader = new FileReader();
        reader.onload = function(event) {
            const userImg = new Image();
            userImg.onload = function() {
                // Ensure template is loaded before drawing
                if (templateImg.complete && templateImg.naturalWidth !== 0) {
                    processDrawing(userImg);
                } else {
                    templateImg.onload = () => processDrawing(userImg);
                    // Re-assign src to force a refresh if it got stuck
                    templateImg.src = templateImg.src;
                }
            };
            userImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function processDrawing(userImg) {
        try {
            // Clear board
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Coordinates for the "hole" in the template
            const drawX = 330;   
            const drawY = 410;  
            const drawWidth = 420; 
            const drawHeight = 350; 

            // Aspect ratio math (to prevent squished faces)
            const imgRatio = userImg.width / userImg.height;
            const boxRatio = drawWidth / drawHeight;
            let sWidth = userImg.width, sHeight = userImg.height, sX = 0, sY = 0;

            if (imgRatio > boxRatio) {
                sWidth = sHeight * boxRatio;
                sX = (userImg.width - sWidth) / 2;
            } else {
                sHeight = sWidth / boxRatio;
                sY = (userImg.height - sHeight) / 2;
            }

            // Layering
            ctx.drawImage(userImg, sX, sY, sWidth, sHeight, drawX, drawY, drawWidth, drawHeight);
            ctx.drawImage(templateImg, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Final Export (JPEG is better for mobile browsers)
            const finalDataUrl = canvas.toDataURL('image/jpeg', 0.92);
            
            if (finalDataUrl === "data:,") {
                throw new Error("Photo too large for browser memory.");
            }

            displayImage.src = finalDataUrl;
            downloadBtn.href = finalDataUrl;
            downloadBtn.download = "My_Blue_Sofa_Postcard.jpg";
            downloadBtn.style.display = "inline-block";

            document.querySelector('.upload-wrapper').style.display = 'none';
            saveInstructions.style.display = 'block';

        } catch (err) {
            alert("Oops! " + err.message);
            document.querySelector('.upload-wrapper .btn').innerText = "📸 Try Again";
        }
    }
</script>

</body>
</html>
